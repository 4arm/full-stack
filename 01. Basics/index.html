<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01. Basics</title>
</head>
<body>
    <h1>Hello Izham</h1>

    <section>
        <h2>Quick Utilities</h2>

        <div>
            <button id="youtubeButton">Visit YouTube</button>
        </div>

        <div>
            <h3>Number Calculator</h3>
            <label for="num1">Number 1</label>
            <input id="num1" type="number" placeholder="Enter first number">
            <label for="num2">Number 2</label>
            <input id="num2" type="number" placeholder="Enter second number">
            <button id="addButton">Add numbers</button>
            <p id="sumResult"></p>
        </div>

        <div>
            <h3>Local Time</h3>
            <p>Current time: <span id="localTime"></span></p>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
