<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Tutorial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #FF0000;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>

</head>
<body>
    <h1>YouTube Tutorial</h1>
    <p>Welcome to this YouTube tutorial. Below is an embedded video for you to watch.</p>
    
    <div class="video-container">
        <iframe src="https://www.youtube.com/" frameborder="0" allowfullscreen></iframe>
    </div>
</body>
</html>
