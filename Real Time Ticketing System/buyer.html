<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sambal Nyet - Buy Now | Online Storefront</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #0f3460 100%);
            color: #ecf0f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 52, 96, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-bottom: 2px solid #ff006e;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.3em;
            color: #ff006e;
            font-weight: bold;
        }

        .header-info {
            display: flex;
            gap: 30px;
            font-size: 0.9em;
        }

        .header-info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .info-label {
            color: #95a5a6;
            font-size: 0.85em;
        }

        .info-value {
            color: #00d4ff;
            font-weight: bold;
            font-size: 1.1em;
        }

        main {
            margin-top: 80px;
            max-width: 600px;
            width: 100%;
        }

        /* ===== PRODUCT SHOWCASE ===== */
        .product-container {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 0, 110, 0.4);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .product-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.1), transparent);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .product-emoji {
            font-size: 4em;
            margin: 20px 0;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .product-name {
            font-size: 2.2em;
            color: #ff006e;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 110, 0.3);
        }

        .product-description {
            font-size: 1em;
            color: #bdc3c7;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .product-price {
            font-size: 1.5em;
            color: #00d4ff;
            font-weight: bold;
            margin: 15px 0;
        }

        /* ===== STOCK TICKER ===== */
        .stock-ticker {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 0, 110, 0.2));
            border: 2px solid #ff006e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

        .stock-ticker.critical {
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.2), rgba(255, 0, 110, 0.2));
            border-color: #ff3b30;
        }

        .stock-ticker.sold-out {
            background: rgba(255, 59, 48, 0.1);
            border-color: #ff3b30;
        }

        .ticker-label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
            margin-bottom: 8px;
        }

        .ticker-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            animation: stockPulse 0.6s ease-out;
        }

        .stock-ticker.critical .ticker-value {
            color: #ff3b30;
            font-size: 2.4em;
        }

        .stock-ticker.sold-out .ticker-value {
            color: #ff3b30;
        }

        @keyframes stockPulse {
            0% {
                transform: scale(1.15);
                color: #00ff88;
            }
            100% {
                transform: scale(1);
            }
        }

        .sold-out-badge {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3b30;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            animation: pulse 1s ease-in-out infinite;
        }

        .stock-ticker.sold-out .sold-out-badge {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== PURCHASE FORM ===== */
        .purchase-form {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #00d4ff;
            font-size: 0.95em;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #ecf0f1;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.1);
        }

        .form-input::placeholder {
            color: #7f8c8d;
        }

        /* Location dropdown styling */
        .form-input select {
            cursor: pointer;
        }

        .form-input select option {
            background: #16213e;
            color: #ecf0f1;
        }

        /* Quantity input */
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-button {
            width: 40px;
            height: 40px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 6px;
            color: #00d4ff;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .qty-button:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .qty-input {
            flex: 1;
            text-align: center;
        }

        /* ===== PRICE SUMMARY ===== */
        .price-summary {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-label {
            color: #bdc3c7;
        }

        .summary-value {
            font-size: 1.4em;
            color: #00ff88;
            font-weight: bold;
        }

        /* ===== BUY BUTTON ===== */
        .buy-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff006e, #ff4081);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
        }

        .buy-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 110, 0.5);
        }

        .buy-button:active {
            transform: translateY(-1px);
        }

        .buy-button:disabled {
            background: rgba(100, 100, 100, 0.5);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* ===== STATUS MESSAGES ===== */
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
        }

        .status-message.error {
            background: rgba(255, 59, 48, 0.2);
            border: 2px solid #ff3b30;
            color: #ff3b30;
        }

        .status-message.info {
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            margin-top: 40px;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .live-connection {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">🌶️ SAMBAL NYET</div>
        <div class="header-info">
            <div class="header-info-item">
                <span class="info-label">Price per Bottle</span>
                <span class="info-value">RM 15.00</span>
            </div>
            <div class="header-info-item">
                <span class="info-label">In Stock</span>
                <span class="info-value" id="headerStock">1,000</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Product Showcase -->
        <section class="product-container">
            <div class="product-emoji">🌶️</div>
            <h1 class="product-name">SAMBAL NYET</h1>
            <p class="product-description">
                Authentic Malaysian sambal with the perfect blend of spices. 
                Premium quality, limited edition launch!
            </p>
            <div class="product-price">RM 15.00 per bottle</div>
        </section>

        <!-- Real-Time Stock Ticker -->
        <section class="stock-ticker" id="stockTicker">
            <div class="ticker-label">⚡ Bottles Remaining</div>
            <div class="ticker-value" id="stockValue">1,000</div>
            <div class="sold-out-badge">SOLD OUT</div>
        </section>

        <!-- Purchase Form -->
        <form class="purchase-form" onsubmit="handlePurchase(event)">
            <!-- Location Selection -->
            <div class="form-group">
                <label class="form-label">📍 Your Location</label>
                <select class="form-input" id="locationSelect" required>
                    <option value="">Select your location...</option>
                    <option value="Kuala Lumpur">Kuala Lumpur</option>
                    <option value="Shah Alam">Shah Alam</option>
                    <option value="Penang">Penang</option>
                    <option value="Johor Bahru">Johor Bahru</option>
                    <option value="Kota Bharu">Kota Bharu</option>
                </select>
            </div>

            <!-- Quantity Selection -->
            <div class="form-group">
                <label class="form-label">🛍️ Quantity</label>
                <div class="quantity-control">
                    <button type="button" class="qty-button" onclick="decreaseQuantity()">−</button>
                    <input type="number" class="form-input qty-input" id="quantityInput" value="1" min="1" max="100" readonly>
                    <button type="button" class="qty-button" onclick="increaseQuantity()">+</button>
                </div>
            </div>

            <!-- Price Summary -->
            <div class="price-summary">
                <span class="summary-label">Total Price</span>
                <span class="summary-value" id="totalPrice">RM 15.00</span>
            </div>

            <!-- Status Message -->
            <div class="status-message" id="statusMessage"></div>

            <!-- Buy Button -->
            <button type="submit" class="buy-button" id="buyButton">BUY NOW</button>
        </form>

        <!-- Footer -->
        <footer>
            <span class="live-connection"></span> Live Connection Active
        </footer>
    </main>

    <!-- Load Shared State Engine -->
    <script src="shared-state.js"></script>

    <script>
        /**
         * BUYER INTERFACE - Real-Time Storefront
         * =======================================
         * Handles purchasing, inventory updates, and real-time stock synchronization.
         * Runs in buyer.html exclusively.
         */

        const UNIT_PRICE = 15.00;

        // ===== INITIALIZATION =====

        /**
         * Initialize buyer interface on page load
         */
        function initializeBuyerInterface() {
            // Set initial state
            updateInventoryDisplay();

            // Subscribe to state changes for real-time updates
            SharedState.onStateChange(function(newState) {
                updateInventoryDisplay();
            });

            console.log('✓ Buyer interface initialized');
        }

        // ===== INVENTORY UPDATES =====

        /**
         * Update inventory display and button state based on current stock
         */
        function updateInventoryDisplay() {
            const state = SharedState.getState();
            const remaining = state.totalStock - state.stockSold;

            // Update header stock
            document.getElementById('headerStock').textContent = remaining.toLocaleString();

            // Update stock ticker value
            const stockValue = document.getElementById('stockValue');
            stockValue.textContent = remaining.toLocaleString();

            // Update stock ticker styling based on inventory level
            const ticker = document.getElementById('stockTicker');
            ticker.classList.remove('critical', 'sold-out');

            if (remaining === 0) {
                ticker.classList.add('sold-out');
                disablePurchase('SOLD OUT - No more inventory available');
            } else if (remaining < 100) {
                ticker.classList.add('critical');
                enablePurchase();
            } else {
                enablePurchase();
            }

            // Animate the update
            stockValue.style.animation = 'none';
            void stockValue.offsetWidth; // Force reflow
            stockValue.style.animation = 'stockPulse 0.6s ease-out';

            updateTotalPrice();
        }

        /**
         * Enable the purchase button
         */
        function enablePurchase() {
            const buyButton = document.getElementById('buyButton');
            buyButton.disabled = false;
            buyButton.textContent = 'BUY NOW';
        }

        /**
         * Disable purchase button with a reason message
         */
        function disablePurchase(reason) {
            const buyButton = document.getElementById('buyButton');
            buyButton.disabled = true;
            buyButton.textContent = reason || 'UNAVAILABLE';
        }

        // ===== QUANTITY CONTROL =====

        /**
         * Increase quantity by 1
         */
        function increaseQuantity() {
            const input = document.getElementById('quantityInput');
            let value = parseInt(input.value) || 1;
            value = Math.min(value + 1, 100); // Max 100
            input.value = value;
            updateTotalPrice();
        }

        /**
         * Decrease quantity by 1
         */
        function decreaseQuantity() {
            const input = document.getElementById('quantityInput');
            let value = parseInt(input.value) || 1;
            value = Math.max(value - 1, 1); // Min 1
            input.value = value;
            updateTotalPrice();
        }

        /**
         * Update total price display based on quantity
         */
        function updateTotalPrice() {
            const quantity = parseInt(document.getElementById('quantityInput').value) || 1;
            const total = (quantity * UNIT_PRICE).toFixed(2);
            document.getElementById('totalPrice').textContent = 'RM ' + total;
        }

        // ===== PURCHASE HANDLING =====

        /**
         * Handle purchase form submission
         */
        function handlePurchase(event) {
            event.preventDefault();

            const location = document.getElementById('locationSelect').value;
            const quantity = parseInt(document.getElementById('quantityInput').value);

            // Clear previous message
            clearStatusMessage();

            // Validate location
            if (!location) {
                showStatusMessage('Please select your location', 'error');
                return;
            }

            // Process transaction through shared state engine
            const result = SharedState.processBuyTransaction(location, quantity);

            if (result.success) {
                showStatusMessage(
                    `✓ Purchase successful! ${quantity} bottle${quantity > 1 ? 's' : ''} from ${location}. Total: RM ${(quantity * UNIT_PRICE).toFixed(2)}`,
                    'success'
                );
                
                // Reset form
                document.getElementById('quantityInput').value = 1;
                document.getElementById('locationSelect').value = '';
                updateTotalPrice();

                // Clear message after 3 seconds
                setTimeout(clearStatusMessage, 3000);
            } else {
                showStatusMessage(result.message, 'error');
            }
        }

        /**
         * Show status message to user
         */
        function showStatusMessage(message, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = 'status-message show ' + type;
        }

        /**
         * Clear status message
         */
        function clearStatusMessage() {
            const el = document.getElementById('statusMessage');
            el.classList.remove('show');
        }

        // ===== EVENT LISTENERS =====

        document.getElementById('quantityInput').addEventListener('change', updateTotalPrice);
        document.getElementById('quantityInput').addEventListener('keyup', updateTotalPrice);

        // Initialize when page loads
        window.addEventListener('load', initializeBuyerInterface);
    </script>
</body>
</html>
